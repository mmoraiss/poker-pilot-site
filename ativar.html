<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Ativar Licença - Poker Pilot</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0B1C2D] text-white flex items-center justify-center h-screen">

<div class="bg-[#0F2236] border border-white/10 p-10 rounded-3xl text-center max-w-md w-full shadow-2xl">

<img src="logo.png" class="w-20 mx-auto mb-6"/>

<h1 class="text-2xl font-bold mb-2">
Poker Pilot Manager
</h1>

<p class="text-slate-400 text-sm mb-6">
Ativação de Licença
</p>

<div class="bg-black/30 rounded-xl p-4 mb-6">
<div class="text-xs text-slate-400">
ID DO CLUBE
</div>

<div id="clubId" class="text-yellow-400 font-bold mt-1">
Carregando...
</div>
</div>

<button
id="payBtn"
onclick="createPayment()"
class="bg-yellow-500 hover:bg-yellow-400 text-black px-6 py-4 rounded-xl font-bold w-full transition">

GERAR PIX PARA ATIVAÇÃO

</button>

<div id="pixArea" class="mt-8 hidden">

<img id="qr" class="mx-auto mb-4 w-56"/>

<textarea
id="pixCode"
class="w-full text-black p-3 rounded-lg text-xs"
rows="4"
readonly></textarea>
  
<button
onclick="copyPix()"
class="mt-3 bg-green-500 hover:bg-green-400 text-black px-4 py-2 rounded-lg font-bold w-full">

COPIAR CÓDIGO PIX

</button>

<p class="text-slate-400 text-xs mt-3">
Escaneie o QR Code ou copie o código PIX
</p>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const clubId = params.get("club")

document.getElementById("clubId").innerText = clubId

async function createPayment(){

const res = await fetch(
"https://pokerpilot-license-server.vercel.app/api/create-payment",
{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ clubId })
}
)

const data = await res.json()

document.getElementById("pixArea").classList.remove("hidden")
document.getElementById("qr").src = data.qr
document.getElementById("pixCode").value = data.pix
document.getElementById("payBtn").style.display = "none"

}
  function copyPix(){

const pix = document.getElementById("pixCode")

pix.select()
pix.setSelectionRange(0, 99999)

navigator.clipboard.writeText(pix.value)

alert("Código PIX copiado!")

}

</script>

</body>
</html>
